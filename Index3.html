<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortal Kombat</title>
    
    <style>
        body{
            background-color: black;
            font-family: Arial;
            text-align: center;
        }
        .destaque{
            color: yellow;
            border: 3px solid red;
        }
        #menu-principal {
            background-color: darkred;
            padding: 15px;
            text-align: center;
        }

        button {
            background-color: black;
            color: white;
            padding: 10px 20px;
            border: 2px solid red;
            font-size: 16px;
        }
        button:hover {
            background-color: red;
        }
        p{
            color: rgb(255, 157, 20);
            font-size: 18px;
            padding: 10px;
        }
        h1{
            font-size: 60px;
            background: linear-gradient(rgb(255, 132, 0), yellow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
    </style>

</head>
<body>
    <div id="menu-principal">
        <a href="#">Início</a>
        <a href="#">Personagens</a>
        <a href="#">Jogos</a>
    </div>

    <h1>MORTAL KOMBAT</h1>

    <p>
        Mortal Kombat é uma famosa franquia de jogos de luta criada pela Midway Games.
    </p>

    <p class="destaque">
        O jogo ficou conhecido pelos golpes especiais, fatalities e personagens icônicos.
    </p>

    <p>
        Scorpion e Sub-Zero são alguns dos lutadores mais populares da série.
    </p>

    <button>Jogar</button>

    <button>Personagens</button>

</body>
</html>
