<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman</title>

    <style>
        body{
            background-color: black;
            font-family: Arial;
            color: white;
        }
        .caixa1{
            width: 300px;
            height: 150px;
            padding: 20px;
            border: 5px solid yellow;
            margin: 30px;
            background-color: black;
        }
        .caixa2{
            width: 200px;
            height: 100px;
            padding: 50px;
            border: 20px dashed darkblue;
            margin: 50px;
            background-color: yellow;
            color: black;
        }

        .caixa3{
            width: 250px;
            height: 120px;
            padding: 20px;
            border: 5px double blue;
            margin: 20px;
            background-color: lightpink;
        }
    </style>

</head>
<body>
     <div class="caixa1">
        <h2>Batman</h2>

        <p>
            Batman protege Gotham City utilizando inteligência, tecnologia e treinamento.
        </p>
    </div>

    <div class="caixa2">
        <h2>Batmóvel</h2>

        <p>
            O Batmóvel é um dos veículos mais famosos dos quadrinhos e filmes.
        </p>
    </div>

    <div class="caixa3">
        <h2>Gotham City</h2>

        <p>
            Gotham é uma cidade dominada pelo crime e protegida pelo Cavaleiro das Trevas.
        </p>
    </div>
</body>
</html>
